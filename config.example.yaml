# 예매 오픈 모니터 설정
max_requests_per_minute: 4

# 오픈 감지 시 브라우저를 띄워서 예매 페이지로 자동 이동
# 사전에 python3 login.py [cgv|megabox] 로 로그인 필요
auto_book: false

# 예매 옵션 (auto_book 사용 시)
booking:
  adults: 2            # 일반(성인) 인원
  teens: 0             # 청소년 인원
  children: 0          # 어린이 인원
  preferred_times:     # 선호 시간대 (우선순위 순서)
    - "18:00-22:00"    # 1순위: 저녁
    - "14:00-18:00"    # 2순위: 오후
    - "09:00-14:00"    # 3순위: 오전
  preferred_seats:     # 선호 좌석 (앞에서부터 시도, 불가 시 다음 좌석)
    - "H12"
    - "H13"

notifications:
  discord_webhook_url: ""

targets:
  # CGV
  - name: "용산 IMAX 헤일메리 4/20"
    type: cgv
    site_no: "0013"
    date: "20260420"
    screen_filter: "IMAX"
    movie_filter: "헤일메리"

  # 메가박스
  - name: "코엑스 DOLBY 헤일메리 5/1"
    type: megabox
    branch_no: "1351"
    date: "20260501"
    screen_filter: "DOLBY"
    movie_filter: "헤일메리"
